name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install PlantUML
        run: sudo apt-get update && sudo apt-get install -y plantuml

      - name: Generate schema.svg
        run: plantuml -tsvg schema.puml

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: schema.svg
